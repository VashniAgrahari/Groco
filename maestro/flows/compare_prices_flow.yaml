appId: com.vashuag.grocery
---
- launchApp:
    clearState: true
    permissions:
      all: allow
- tapOn:
    text: "Wait"
    optional: true
- assertVisible: "My Grocery Items"
- tapOn: "Load Demo Data"
- tapOn:
    id: "compare_item_button"
- assertVisible: "Compare Prices"
- tapOn:
    id: "compare_search_button"
- assertVisible:
    id: "compare_results_header"
- pressKey: back
- assertVisible: "My Grocery Items"
